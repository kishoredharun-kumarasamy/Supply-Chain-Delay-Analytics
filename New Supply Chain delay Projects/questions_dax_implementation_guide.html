
<h2 class="sr-only">Interactive implementation guide showing how each of the 30 business questions maps to specific DAX measures, Power BI visuals, and dashboard pages</h2>
<style>
*{box-sizing:border-box;margin:0;padding:0}
.wrap{padding:1rem 0 2.5rem;max-width:680px}
.top-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.tb{font-size:12px;padding:5px 13px;border-radius:20px;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);cursor:pointer;color:var(--color-text-secondary);font-family:inherit;transition:all .15s}
.tb.on{border-color:transparent;color:#fff}
.sec-lbl{font-size:11px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-secondary);margin:1.5rem 0 .6rem}
.impl-card{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);background:var(--color-background-primary);margin-bottom:8px;overflow:hidden}
.ic-head{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;cursor:pointer}
.ic-head:hover{background:var(--color-background-secondary)}
.ic-num{font-size:11px;font-weight:500;color:var(--color-text-secondary);min-width:22px;padding-top:1px;flex-shrink:0}
.ic-q{font-size:13px;font-weight:500;color:var(--color-text-primary);flex:1;line-height:1.5}
.ic-badges{display:flex;gap:5px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end;max-width:160px}
.badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500;white-space:nowrap}
.chev{font-size:16px;color:var(--color-text-secondary);transition:transform .18s;padding-top:1px;flex-shrink:0}
.ic-body{display:none;border-top:0.5px solid var(--color-border-tertiary);padding:12px 14px 14px 46px}
.ic-body.open{display:block}
.impl-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.impl-sec{font-size:11px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.impl-list{list-style:none}
.impl-list li{font-size:12px;color:var(--color-text-primary);padding:2px 0;line-height:1.5}
.impl-list li::before{content:"→ ";color:var(--color-text-secondary)}
.code{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:6px;padding:8px 10px;font-family:var(--font-mono,monospace);font-size:11px;color:var(--color-text-primary);white-space:pre;overflow-x:auto;line-height:1.6;margin-top:4px}
.how-box{background:var(--color-background-info);border:0.5px solid var(--color-border-info);border-radius:6px;padding:8px 10px;margin-top:8px;font-size:12px;color:var(--color-text-info);line-height:1.5}
.copy-btn{font-size:11px;padding:2px 9px;margin-top:5px;cursor:pointer;font-family:inherit}
</style>

let activeCat="all";

function filter(btn){
  document.querySelectorAll(".tb").forEach(b=>{
    b.classList.remove("on");
    b.style.background="";
    b.style.color="";
  });
  btn.classList.add("on");
  btn.style.background=CAT_COLOR[btn.dataset.cat]||"#378ADD";
  btn.style.color="#fff";
  activeCat=btn.dataset.cat;
  render();
}

function render(){
  const list=document.getElementById("list");
  list.innerHTML="";
  const filtered=activeCat==="all"?DATA:DATA.filter(d=>d.cat===activeCat);
  const groups=activeCat==="all"?GROUPS:GROUPS.filter(g=>g.cat===activeCat);
  groups.forEach(g=>{
    const items=filtered.filter(d=>d.cat===g.cat);
    if(!items.length)return;
    const lbl=document.createElement("div");
    lbl.className="sec-lbl";
    lbl.textContent=g.label;
    list.appendChild(lbl);
    items.forEach(d=>{
      const card=document.createElement("div");
      card.className="impl-card";
      card.innerHTML=`
        <div class="ic-head" onclick="tog(this)">
          <span class="ic-num">${d.n}</span>
          <span class="ic-q">${d.q}</span>
          <div class="ic-badges">
            <span class="badge" style="background:${DB_BG[d.db]};color:${DB_TC[d.db]}">${d.db}</span>
            <span class="badge" style="background:${CAT_BG[d.cat]};color:${CAT_TC[d.cat]}">${CAT_LABEL[d.cat]}</span>
          </div>
          <span class="chev">›</span>
        </div>
        <div class="ic-body">
          <div class="impl-grid">
            <div>
              <div class="impl-sec">DAX measures needed</div>
              <ul class="impl-list">${d.measures.map(m=>`<li>${m}</li>`).join("")}</ul>
            </div>
            <div>
              <div class="impl-sec">Columns used</div>
              <ul class="impl-list">${d.columns.map(c=>`<li>${c}</li>`).join("")}</ul>
            </div>
          </div>
          <div class="impl-sec">Visual type: ${d.visual}</div>
          <div class="code" id="code-${d.n}">${d.dax}</div>
          <button class="copy-btn" onclick="cp(${d.n},this)"><i class="ti ti-copy" style="font-size:12px;margin-right:4px" aria-hidden="true"></i>Copy DAX</button>
          <div class="how-box"><strong>How to build it:</strong> ${d.how}</div>
        </div>`;
      list.appendChild(card);
    });
  });
}

function tog(head){
  const body=head.nextElementSibling;
  const chev=head.querySelector(".chev");
  const open=body.classList.toggle("open");
  chev.style.transform=open?"rotate(90deg)":"";
}

function cp(n,btn){
  const el=document.getElementById("code-"+n);
  navigator.clipboard.writeText(el.textContent).then(()=>{
    btn.textContent="Copied!";
    setTimeout(()=>{ btn.innerHTML='<i class="ti ti-copy" style="font-size:12px;margin-right:4px" aria-hidden="true"></i>Copy DAX'; },1800);
  });
}

render();
</script>
